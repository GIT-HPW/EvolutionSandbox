<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; media-src 'self'; base-uri 'none'; form-action 'none'">
    <meta name="description" content="EvolutionSandbox 宇宙演化阶段选择。">
    <title>EvolutionSandbox · 演化纪元</title>
    <link rel="stylesheet" href="menu.css">
    <script type="module" src="menu.js"></script>
  </head>
  <body>
    <main class="lobby-shell">
      <header class="lobby-header">
        <div>
          <p class="eyebrow">EVOLUTION / CONTROLLED SCENE LOBBY</p>
          <h1>选择演化纪元</h1>
          <p class="lobby-intro">每个纪元拥有独立的运行环境。进入后，页面切换只由场景控制器和已确认检查点触发。</p>
        </div>
        <nav aria-label="项目导航">
          <a href="../">轻量版</a>
          <a href="https://github.com/GIT-HPW/EvolutionSandbox">源码</a>
        </nav>
      </header>

      <section aria-labelledby="stage-title">
        <div class="section-heading">
          <div>
            <p>WORLD TIMELINE</p>
            <h2 id="stage-title">可进入阶段</h2>
          </div>
          <span>本地检查点 / 独立场景</span>
        </div>
        <div id="stage-grid" class="stage-grid" aria-live="polite">
          <p class="loading">正在读取可用场景……</p>
        </div>
      </section>

      <footer>
        <p id="lobby-status" role="status">正在验证场景目录和本地导航记录……</p>
        <button id="reset-navigation" type="button" hidden>重建导航记录</button>
      </footer>
    </main>
  </body>
</html>
