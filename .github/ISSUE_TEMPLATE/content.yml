name: Content proposal
description: 提议新的章节规则、维度或时间线
title: "content: "
labels: [content]
body:
  - type: input
    id: source
    attributes:
      label: Evolution- 来源
      description: 对应章节或新增世界观文档路径。
    validations:
      required: true
  - type: textarea
    id: loop
    attributes:
      label: 可玩闭环
      description: 玩家输入、状态变化、成功/失败条件和可自动测试的路径。
    validations:
      required: true
