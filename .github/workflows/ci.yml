name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Rules, content, runtime and public-tree checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Build tested source archive
        run: git archive --format=zip --prefix=EvolutionSandbox/ -o EvolutionSandbox-tested.zip HEAD
      - name: Upload tested source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: EvolutionSandbox-tested-${{ github.run_number }}
          path: EvolutionSandbox-tested.zip
          retention-days: 14
          if-no-files-found: error
      - name: Summary
        if: always()
        run: |
          echo "## EvolutionSandbox verification" >> "$GITHUB_STEP_SUMMARY"
          echo "Rules, content generation, existing-world preservation, Lua syntax, browser build, public-tree secrets and dependency audit were checked." >> "$GITHUB_STEP_SUMMARY"
          echo "A tested source ZIP is attached when this workflow succeeds." >> "$GITHUB_STEP_SUMMARY"
