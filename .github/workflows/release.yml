name: release-source

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Build clean source ZIP
        run: git archive --format=zip --prefix="EvolutionSandbox-${GITHUB_REF_NAME}/" -o "EvolutionSandbox-${GITHUB_REF_NAME}.zip" HEAD
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" "EvolutionSandbox-${GITHUB_REF_NAME}.zip#Tested source ZIP" --verify-tag --generate-notes --title "EvolutionSandbox ${GITHUB_REF_NAME}"
